<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Foundations — One Family Church</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    /* ─── ONE FAMILY CHURCH DESIGN TOKENS ─── */
    :root {
      /* Core palette */
      --dark: #20242A;
      --dark-mid: #2B3139;
      --dark-secondary: #39424C;
      --near-black: #090A0D;
      --gray: #5E6C7A;

      --accent: #FF953E;
      --accent-light: #FFB76B;
      --accent-soft: rgba(255, 149, 62, 0.1);

      --blue: #94D8E9;
      --blue-light: #D0ECF6;
      --blue-pale: #F4FBFE;

      /* Semantic tokens */
      --bg: #F4FBFE;
      --surface: #FFFFFF;
      --border: rgba(94, 108, 122, 0.12);
      --text: #20242A;
      --text-secondary: #39424C;
      --text-muted: #5E6C7A;

      /* Typography */
      --font-heading: 'Montserrat', system-ui, sans-serif;
      --font-body: 'Montserrat', system-ui, sans-serif;
    }

    /* ─── RESET ─── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      overflow-x: hidden;
    }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── GLOBAL TYPOGRAPHY ─── */
    h1, h2, h3, h4, h5 {
      font-family: var(--font-heading);
      line-height: 1.2;
    }

    /* ─── BUTTON HOVER STATES ─── */
    button:hover {
      opacity: 0.92;
    }
    button:active {
      transform: scale(0.98);
    }

    /* ─── SELECTION ─── */
    ::selection {
      background: rgba(255, 149, 62, 0.2);
      color: var(--dark);
    }

    /* ─── ACCESSIBILITY ─── */
    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ─── RESPONSIVE ─── */
    @media (min-width: 640px) {
      body {
        background: var(--dark);
      }
      #root {
        max-width: 430px;
        margin: 0 auto;
        min-height: 100dvh;
        background: var(--bg);
        box-shadow: 0 0 60px rgba(0,0,0,0.3);
        position: relative;
      }
    }

    /* ─── LIST STYLES ─── */
    ul {
      list-style: none;
      padding-left: 0;
    }
    ul li {
      position: relative;
      padding-left: 16px;
    }
    ul li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 9px;
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--accent);
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App Scripts -->
  <script type="text/babel" src="guide-data.jsx"></script>
  <script type="text/babel" src="guide-components.jsx"></script>
  <script type="text/babel" src="components/tweaks-panel.jsx"></script>
  <script type="text/babel" src="guide-app.jsx"></script>

  <!-- Mount -->
  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "accentColor": "#FF953E"
    }/*EDITMODE-END*/;

    function applyTheme(tweaks) {
      const t = tweaks || TWEAK_DEFAULTS;
      if (t.theme === 'dark') {
        document.documentElement.style.setProperty('--bg', '#090A0D');
        document.documentElement.style.setProperty('--surface', '#20242A');
        document.documentElement.style.setProperty('--border', 'rgba(148,216,233,0.1)');
        document.documentElement.style.setProperty('--text', '#F4FBFE');
        document.documentElement.style.setProperty('--text-secondary', '#D0ECF6');
        document.documentElement.style.setProperty('--text-muted', '#94D8E9');
      } else {
        document.documentElement.style.setProperty('--bg', '#F4FBFE');
        document.documentElement.style.setProperty('--surface', '#FFFFFF');
        document.documentElement.style.setProperty('--border', 'rgba(94,108,122,0.12)');
        document.documentElement.style.setProperty('--text', '#20242A');
        document.documentElement.style.setProperty('--text-secondary', '#39424C');
        document.documentElement.style.setProperty('--text-muted', '#5E6C7A');
      }
      document.documentElement.style.setProperty('--accent', t.accentColor || '#FF953E');
      document.documentElement.style.setProperty('--accent-soft', (t.accentColor || '#FF953E') + '18');
    }

    // Tweaks-enabled wrapper (only if useTweaks is available)
    function TweakedApp() {
      const [tweaks, setTweak] = window.useTweaks(TWEAK_DEFAULTS);
      const TP = window.TweaksPanel;
      const TS = window.TweakSection;
      const TR = window.TweakRadio;
      const TC = window.TweakColor;

      React.useEffect(() => { applyTheme(tweaks); }, [tweaks]);

      return (
        <React.Fragment>
          <App />
          <TP title="Guide Settings">
            <TS label="Appearance">
              <TR
                label="Theme"
                value={tweaks.theme}
                options={[
                  { label: "Light", value: "light" },
                  { label: "Dark", value: "dark" },
                ]}
                onChange={v => setTweak("theme", v)}
              />
              <TC
                label="Accent Color"
                value={tweaks.accentColor}
                options={["#FF953E", "#94D8E9", "#FFB76B", "#5E6C7A"]}
                onChange={v => setTweak("accentColor", v)}
              />
            </TS>
          </TP>
        </React.Fragment>
      );
    }

    // Simple wrapper (fallback)
    function SimpleApp() {
      React.useEffect(() => { applyTheme(TWEAK_DEFAULTS); }, []);
      return <App />;
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(window.useTweaks ? <TweakedApp /> : <SimpleApp />);
  </script>
</body>
</html>
